    <stop offset="0%" stop-color="#2e6fd8"/>
    <stop offset="100%" stop-color="#c8a856"/>
  </linearGradient>
</defs>

<!-- 背景 -->
<rect width="1080" height="1080" fill="#0e1b33"/>

<!-- 背景モチーフ -->
