<text x="540" y="938" text-anchor="middle" font-family="'Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif" font-size="15" fill="#4a7ab5" letter-spacing="0.5">情報・判断・役割・実行の流れから、組織の詰まりを見える化します</text>

