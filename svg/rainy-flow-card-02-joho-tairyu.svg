<text x="540" y="96" text-anchor="middle" font-family="'Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif" font-size="20" fill="#c8a856" letter-spacing="6">DIAGNOSIS RESULT</text>
<line x1="60" y1="118" x2="460" y2="118" stroke="#1e3460" stroke-width="1"/>
<line x1="620" y1="118" x2="1020" y2="118" stroke="#1e3460" stroke-width="1"/>
<circle cx="540" cy="118" r="4" fill="#c8a856"/>

<!-- 結果タイプ -->
<text x="540" y="198" text-anchor="middle" font-family="'Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif" font-size="58" font-weight="700" fill="#ffffff" letter-spacing="4">情報滞留型</text>
<text x="540" y="232" text-anchor="middle" font-family="'Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif" font-size="17" fill="#7a9abf" letter-spacing="2">の傾向がありそうです</text>
<line x1="300" y1="252" x2="780" y2="252" stroke="#c8a856" stroke-width="1" opacity="0.6"/>

<!-- 左カラム -->
<text x="66" y="296" font-family="'Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif" font-size="14" fill="#4a7ab5" letter-spacing="3">この傾向について</text>
<line x1="66" y1="304" x2="490" y2="304" stroke="#1e3460" stroke-width="1"/>
<text font-family="'Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif" font-size="16" fill="#c8d8ef" letter-spacing="0.3">
  <tspan x="66" y="328">情報が、必要な人に届くまでの経路で</tspan>
  <tspan x="66" dy="28">滞留しやすい傾向がありそうです。</tspan>
  <tspan x="66" dy="28"></tspan>
  <tspan x="66" dy="28">悪意がなくても、共有の場所やタイミングが</tspan>
  <tspan x="66" dy="28">決まっていないと、情報は自然に途中で</tspan>
  <tspan x="66" dy="28">止まります。「聞いていなかった」が起きるのは、</tspan>
  <tspan x="66" dy="28">人の問題ではなく経路の問題で</tspan>
  <tspan x="66" dy="28">あることがほとんどです。</tspan>
</text>


<text x="66" y="558" font-family="'Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif" font-size="14" fill="#4a7ab5" letter-spacing="3">最初の一手</text>
<line x1="66" y1="566" x2="490" y2="566" stroke="#1e3460" stroke-width="1"/>
<text font-family="'Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif" font-size="16" fill="#c8d8ef" letter-spacing="0.3">
  <tspan x="66" y="590">「この種類の情報は、ここに置く」という</tspan>
  <tspan x="66" dy="28">置き場所をひとつ決めることから始めてください。</tspan>
  <tspan x="66" dy="28">全部を整える必要はありません。まずはひとつの</tspan>
  <tspan x="66" dy="28">流れが通るだけで、滞留は目に見えて減ります。</tspan>
</text>


<!-- 中央区切り -->
<line x1="524" y1="268" x2="524" y2="744" stroke="#1e3460" stroke-width="1"/>

