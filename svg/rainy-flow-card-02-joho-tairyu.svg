  <rect x="564" y="486" width="150" height="16" rx="8" fill="#2e6fd8" opacity="0.45"/>
  <text x="972" y="501" text-anchor="end" font-family="'Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif" font-size="15" fill="#7a9abf" font-weight="400">38</text>
  <text x="564" y="544" font-family="'Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif" font-size="15" fill="#8faac8">実行停滞型</text>
  <rect x="564" y="554" width="390" height="16" rx="8" fill="#132240"/>
  <rect x="564" y="554" width="120" height="16" rx="8" fill="#2e6fd8" opacity="0.35"/>
  <text x="972" y="569" text-anchor="end" font-family="'Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif" font-size="15" fill="#7a9abf" font-weight="400">31</text>

