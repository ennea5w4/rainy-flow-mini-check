<line x1="920" y1="206" x2="640" y2="1020" stroke="#172847" stroke-width="1"/>
<circle cx="160" cy="445" r="5" fill="#253d6a"/>
<circle cx="640" cy="760" r="5" fill="#253d6a"/>
<line x1="160" y1="445" x2="640" y2="760" stroke="#172847" stroke-width="1"/>
<circle cx="110" cy="890" r="48" fill="none" stroke="#172847" stroke-width="1"/>
<circle cx="110" cy="890" r="5" fill="#253d6a"/>
<line x1="110" y1="842" x2="320" y2="320" stroke="#172847" stroke-width="0.8"/>
<circle cx="1020" cy="640" r="32" fill="none" stroke="#172847" stroke-width="0.8"/>

<!-- トップゴールドライン -->
<rect x="0" y="0" width="1080" height="5" fill="#c8a856"/>

<!-- ヘッダー -->
